<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="layout">
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    </svg>
                    <span>WeatherML</span>
                </div>
                <nav class="nav-tabs">
                    <button class="tab active" data-tab="forecast">Прогноз</button>
                    <button class="tab" data-tab="metrics">Сравнение моделей</button>
                </nav>
            </div>
        </header>

        <main class="main">
            <!-- FORECAST TAB -->
            <div class="tab-content active" id="tab-forecast">
                <div class="controls-bar">
                    <div class="control-group">
                        <label class="control-label">Город</label>
                        <select id="citySelect" class="select"></select>
                    </div>
                    <div class="control-group">
                        <label class="control-label">Модель</label>
                        <select id="modelSelect" class="select"></select>
                    </div>
                    <div class="control-group">
                        <label class="control-label">Горизонт</label>
                        <select id="horizonSelect" class="select">
                            <option value="1">1 день</option>
                            <option value="3">3 дня</option>
                            <option value="7" selected>7 дней</option>
                        </select>
                    </div>
                    <button id="forecastButton" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        Спрогнозировать
                    </button>
                    <button id="updateButton" class="btn btn-secondary">
                        Обновить данные / переобучить
                    </button>
                </div>
                <div id="updateStatus" class="status-message"></div>
                <div id="automationStatus" class="status-message"></div>
                <div id="comparisonStatus" class="status-message"></div>
                <div id="forecastStatus" class="status-message"></div>

                <div class="content-grid">
                    <div class="card chart-card">
                        <div class="card-header">
                            <span class="card-title">Температура</span>
                            <div class="legend">
                                <span class="legend-item"><span class="dot dot-blue"></span>Факт</span>
                                <span class="legend-item"><span class="dot dot-red"></span>Прогноз</span>
                            </div>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="forecastChart"></canvas>
                        </div>
                    </div>

                    <div class="card table-card">
                        <div class="card-header">
                            <span class="card-title">Данные прогноза</span>
                        </div>
                        <table id="forecastTable">
                            <thead>
                                <tr>
                                    <th>Дата</th>
                                    <th>Температура</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="empty-row"><td colspan="2">Выберите параметры и нажмите «Спрогнозировать»</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- METRICS TAB -->
            <div class="tab-content" id="tab-metrics">
                <div class="controls-bar">
                    <div class="control-group">
                        <label class="control-label">Город</label>
                        <select id="citySelectMetrics" class="select"></select>
                    </div>
                    <button id="metricsButton" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                        Сравнить модели
                    </button>
                </div>
                <div id="metricsStatus" class="status-message"></div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Метрики качества</span>
                        <span id="bestModel" class="badge"></span>
                    </div>
                    <table id="metricsTable">
                        <thead>
                            <tr>
                                <th>Модель</th>
                                <th>MAE</th>
                                <th>RMSE</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="empty-row"><td colspan="3">Нажмите «Сравнить модели» для загрузки метрик</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
